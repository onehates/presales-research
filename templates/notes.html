<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — {{ brief_name }} — Pre-Sales Research Platform</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    @media (prefers-reduced-motion: no-preference) { body { animation: pageIn 0.25s ease-out; } }
    @keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .note-card.dragging { opacity: 0.5; }
    .note-card { transition: box-shadow 0.15s, border-color 0.15s; }
    .note-card:hover { border-color: #93c5fd; box-shadow: 0 4px 16px rgba(59,130,246,0.08); }
    .dark .note-card:hover { border-color: #3b82f6; box-shadow: 0 4px 16px rgba(59,130,246,0.15); }

    .drag-handle { cursor: grab; user-select: none; color: #94a3b8; font-size: 1.1rem; letter-spacing: -2px; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover { color: #64748b; }
    .dark .drag-handle { color: #64748b; }
    .dark .drag-handle:hover { color: #94a3b8; }

    .drop-indicator { height: 3px; background: #3b82f6; border-radius: 2px; margin: -2px 0; transition: opacity 0.1s; }

    textarea { resize: vertical; }
    textarea:focus, input:focus { outline: none; box-shadow: 0 0 0 2px #3b82f6; border-color: #3b82f6; }

    /* Toast animation */
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(8px); } }
    .toast { animation: toastIn 200ms ease forwards; }
    .toast.fade-out { animation: toastOut 300ms ease forwards; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-gray-200 dark:border-slate-800 no-print">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <a href="/briefs/{{ slug }}-{{ date }}.html"
           class="flex items-center gap-1.5 text-sm text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium shrink-0 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Back to Brief
        </a>
        <span class="text-gray-300 dark:text-slate-700 hidden sm:inline">|</span>
        <h1 class="text-base sm:text-lg font-semibold truncate">Notes — {{ brief_name }}</h1>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span id="global-status" class="text-xs text-gray-400 dark:text-slate-500 hidden sm:inline whitespace-nowrap"></span>
        <button onclick="toggleDarkMode()" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors" title="Toggle dark mode">
          <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="max-w-4xl mx-auto w-full px-4 sm:px-6 pt-5 pb-2 flex flex-wrap items-center justify-between gap-3 no-print">
    <button onclick="addNote()" class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Note
    </button>
    <div class="flex items-center gap-2">
      <span id="note-count" class="text-xs text-gray-400 dark:text-slate-500"></span>
      <button onclick="exportAllMarkdown()" class="inline-flex items-center gap-1.5 px-3 py-1.5 border border-gray-300 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 text-sm font-medium rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Export All as Markdown
      </button>
    </div>
  </div>

  <!-- Freeform notes (shared with brief popup) -->
  <div class="max-w-4xl mx-auto w-full px-4 sm:px-6 pt-4">
    <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-slate-300">Quick Notes</h2>
        <span id="freeform-status" class="text-xs text-gray-400 dark:text-slate-500"></span>
      </div>
      <textarea id="freeform-textarea"
                class="w-full bg-gray-50 dark:bg-slate-800/50 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-300 placeholder-gray-400 dark:placeholder-slate-600 min-h-[120px] transition-colors"
                placeholder="Type quick notes here... shared with the Notes popup in the brief."></textarea>
    </div>
  </div>

  <!-- Structured notes list -->
  <main class="max-w-4xl mx-auto w-full px-4 sm:px-6 py-4 flex-1">
    <div id="notes-list" class="flex flex-col gap-3"></div>
    <div id="empty-state" class="hidden text-center py-16">
      <svg class="w-12 h-12 mx-auto text-gray-300 dark:text-slate-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      <p class="text-gray-500 dark:text-slate-400 text-sm mb-1">No notes yet</p>
      <p class="text-gray-400 dark:text-slate-500 text-xs">Click "+ New Note" to add your first note for this brief.</p>
    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col-reverse gap-2 no-print"></div>

  {% include '_footer.html' %}

<script>
(function() {
  // ── Config ──
  const SLUG = {{ slug | tojson }};
  const DATE = {{ date | tojson }};
  const STORAGE_KEY = `notes-${SLUG}-${DATE}`;
  const AUTOSAVE_DELAY = 2000;

  let notes = [];
  let lastSaveTime = null;
  let saveTimer = null;
  let statusInterval = null;

  // ── Dark mode ──
  function initDarkMode() {
    const pref = localStorage.getItem('theme-preference') || 'system';
    if (pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  }
  initDarkMode();

  window.toggleDarkMode = function() {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    localStorage.setItem('theme-preference', isDark ? 'dark' : 'light');
  };

  // ── Persistence ──
  function loadNotes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      notes = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(notes)) notes = [];
    } catch (e) {
      notes = [];
    }
  }

  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    lastSaveTime = Date.now();
    updateGlobalStatus();
    showToast('Saved', 'success');
  }

  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNotes, AUTOSAVE_DELAY);
  }

  // ── Status ──
  function updateGlobalStatus() {
    const el = document.getElementById('global-status');
    if (!lastSaveTime) { el.textContent = ''; return; }
    const sec = Math.round((Date.now() - lastSaveTime) / 1000);
    if (sec < 5) el.textContent = 'All changes saved just now';
    else if (sec < 60) el.textContent = `All changes saved ${sec}s ago`;
    else el.textContent = `All changes saved ${Math.floor(sec / 60)}m ago`;
  }

  function updateNoteCount() {
    const el = document.getElementById('note-count');
    el.textContent = notes.length === 1 ? '1 note' : `${notes.length} notes`;
  }

  // ── Toast ──
  function showToast(message, type) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const bgColor = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-slate-700';
    toast.className = `toast ${bgColor} text-white text-xs font-medium px-3 py-2 rounded-lg shadow-lg flex items-center gap-2`;
    const icon = type === 'success'
      ? '<svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
      : '<svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>';
    toast.innerHTML = `${icon}<span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      setTimeout(() => toast.remove(), 300);
    }, 1500);
  }

  // ── Note CRUD ──
  function generateId() {
    return 'n_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
  }

  window.addNote = function() {
    const now = new Date().toISOString();
    const note = {
      id: generateId(),
      title: '',
      body: '',
      created_at: now,
      updated_at: now,
      question: null
    };
    notes.unshift(note);
    renderNotes();
    scheduleSave();
    // Focus the new title input
    const firstCard = document.querySelector('.note-card');
    if (firstCard) {
      const titleInput = firstCard.querySelector('.note-title');
      if (titleInput) titleInput.focus();
    }
  };

  function updateNote(id, field, value) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    note[field] = value;
    note.updated_at = new Date().toISOString();
    scheduleSave();
  }

  window.deleteNote = function(id) {
    const idx = notes.findIndex(n => n.id === id);
    if (idx === -1) return;
    notes.splice(idx, 1);
    renderNotes();
    saveNotes();
  };

  // ── Export ──
  window.exportAllMarkdown = function() {
    if (notes.length === 0) {
      showToast('No notes to export', 'info');
      return;
    }
    let md = `# Notes — {{ brief_name }}\n\n`;
    notes.forEach((note, i) => {
      const title = note.title || 'Untitled Note';
      const ts = new Date(note.updated_at).toLocaleString();
      md += `## ${i + 1}. ${title}\n`;
      md += `_Updated: ${ts}_`;
      if (note.question) md += ` | _Question: ${note.question}_`;
      md += `\n\n${note.body || '(empty)'}\n\n---\n\n`;
    });

    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `notes-${SLUG}-${DATE}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Exported as Markdown', 'success');
  };

  // ── Render ──
  function renderNotes() {
    const list = document.getElementById('notes-list');
    const empty = document.getElementById('empty-state');

    if (notes.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      updateNoteCount();
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = notes.map((note, idx) => {
      const ts = new Date(note.updated_at).toLocaleString();
      const questionBadge = note.question
        ? `<span class="inline-flex items-center gap-1 text-xs bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded-full"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01"/></svg>${escapeHtml(note.question)}</span>`
        : '';
      return `
        <div class="note-card bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4"
             draggable="true" data-idx="${idx}" data-id="${note.id}">
          <div class="flex items-start gap-3">
            <div class="drag-handle pt-1 select-none" title="Drag to reorder" aria-label="Drag handle">&#8942;&#8942;</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-2">
                <input type="text" class="note-title flex-1 bg-transparent border-0 border-b border-transparent hover:border-gray-300 dark:hover:border-slate-700 focus:border-blue-500 text-base font-semibold placeholder-gray-400 dark:placeholder-slate-600 px-0 py-0.5 transition-colors"
                       value="${escapeAttr(note.title)}" placeholder="Untitled Note"
                       oninput="window._updateNote('${note.id}', 'title', this.value)">
                <button onclick="deleteNote('${note.id}')" class="shrink-0 p-1.5 rounded-lg text-gray-400 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" title="Delete note">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
              <textarea class="note-body w-full bg-gray-50 dark:bg-slate-800/50 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-300 placeholder-gray-400 dark:placeholder-slate-600 min-h-[80px] transition-colors"
                        placeholder="Write your note in markdown..."
                        oninput="window._updateNote('${note.id}', 'body', this.value)">${escapeHtml(note.body)}</textarea>
              <div class="flex items-center gap-2 mt-2 flex-wrap">
                <span class="text-xs text-gray-400 dark:text-slate-500">${ts}</span>
                ${questionBadge}
              </div>
            </div>
          </div>
        </div>`;
    }).join('');

    updateNoteCount();
    attachDragListeners();
  }

  window._updateNote = function(id, field, value) {
    updateNote(id, field, value);
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Drag & Drop ──
  let dragSrcIdx = null;

  function attachDragListeners() {
    const cards = document.querySelectorAll('.note-card');
    cards.forEach(card => {
      const handle = card.querySelector('.drag-handle');

      // Only allow drag when starting from the handle
      handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
      card.addEventListener('mouseup', () => { card.setAttribute('draggable', 'true'); });

      card.addEventListener('dragstart', function(e) {
        // Only allow if drag started from handle
        if (!e.target.closest('.drag-handle') && e.target !== card) {
          // If the drag didn't originate from handle area, we still allow since draggable is on card
        }
        dragSrcIdx = parseInt(this.dataset.idx);
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.idx);
      });

      card.addEventListener('dragend', function() {
        this.classList.remove('dragging');
        document.querySelectorAll('.note-card').forEach(c => {
          c.classList.remove('border-t-2', 'border-b-2', 'border-blue-400');
        });
        dragSrcIdx = null;
      });

      card.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = this.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;

        // Remove previous indicators
        document.querySelectorAll('.note-card').forEach(c => {
          c.style.borderTopColor = '';
          c.style.borderBottomColor = '';
          c.classList.remove('border-t-2', 'border-b-2');
        });

        if (e.clientY < midY) {
          this.classList.add('border-t-2');
          this.style.borderTopColor = '#3b82f6';
        } else {
          this.classList.add('border-b-2');
          this.style.borderBottomColor = '#3b82f6';
        }
      });

      card.addEventListener('dragleave', function() {
        this.classList.remove('border-t-2', 'border-b-2');
        this.style.borderTopColor = '';
        this.style.borderBottomColor = '';
      });

      card.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('border-t-2', 'border-b-2');
        this.style.borderTopColor = '';
        this.style.borderBottomColor = '';

        const targetIdx = parseInt(this.dataset.idx);
        if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;

        const rect = this.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        let insertIdx = e.clientY < midY ? targetIdx : targetIdx + 1;

        // Adjust for removal offset
        const movedNote = notes.splice(dragSrcIdx, 1)[0];
        if (dragSrcIdx < insertIdx) insertIdx--;
        notes.splice(insertIdx, 0, movedNote);

        renderNotes();
        saveNotes();
      });
    });
  }

  // ── Freeform notes (shared with brief popup) ──
  const FREEFORM_KEY = `notes-freeform:${SLUG}:${DATE}`;
  const freeformTa = document.getElementById('freeform-textarea');
  const freeformStatus = document.getElementById('freeform-status');
  let freeformTimer = null;

  if (freeformTa) {
    freeformTa.value = localStorage.getItem(FREEFORM_KEY) || '';
    if (freeformTa.value) freeformStatus.textContent = 'Loaded';
    freeformTa.addEventListener('input', function() {
      freeformStatus.textContent = 'Saving…';
      if (freeformTimer) clearTimeout(freeformTimer);
      freeformTimer = setTimeout(function() {
        localStorage.setItem(FREEFORM_KEY, freeformTa.value);
        freeformStatus.textContent = 'Saved ✓';
        freeformTimer = null;
      }, 500);
    });
  }

  // ── Init ──
  loadNotes();
  renderNotes();

  // Update global status every 5s
  statusInterval = setInterval(updateGlobalStatus, 5000);

  // Set initial status if notes exist
  if (notes.length > 0) {
    lastSaveTime = Date.now();
    updateGlobalStatus();
  }
})();
</script>

</body>
</html>
