<style>
/* Footer */
.app-footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid rgba(148, 163, 184, 0.2); font-size: 0.8rem; color: rgb(100, 116, 139); text-align: center; }
.dark .app-footer { border-top-color: rgba(71, 85, 105, 0.4); color: rgb(148, 163, 184); }
.footer-content { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
.footer-separator { margin: 0 0.5rem; opacity: 0.5; }
.footer-version { font-family: monospace; font-weight: 600; }
.footer-link { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.footer-link:hover { color: rgb(59, 130, 246); }
@media print { .app-footer { display: none !important; } }

/* ===================================================================
   DARK MODE: NUCLEAR CONTRAST FIX
   ===================================================================
   Previous fix used .dark .bg-green-950 selectors which DON'T match
   Tailwind CDN classes (elements have class="dark:bg-green-950" with
   the dark: prefix). Attribute selectors [class*="bg-green-9"] match
   both "bg-green-950" and "dark:bg-green-950".

   All rules use !important to beat Tailwind CDN's generated utilities.
   =================================================================== */

/* --- GREEN family (procurement, validated, expansion) --- */
html.dark [class*="bg-green-9"],
html.dark [class*="bg-emerald-9"] {
  color: rgb(240, 253, 244) !important; /* green-50: near-white */
}
html.dark [class*="bg-green-9"] *,
html.dark [class*="bg-emerald-9"] * {
  color: rgb(240, 253, 244) !important;
}
html.dark [class*="bg-green-9"] h1,
html.dark [class*="bg-green-9"] h2,
html.dark [class*="bg-green-9"] h3,
html.dark [class*="bg-green-9"] h4,
html.dark [class*="bg-emerald-9"] h1,
html.dark [class*="bg-emerald-9"] h2,
html.dark [class*="bg-emerald-9"] h3,
html.dark [class*="bg-emerald-9"] h4 {
  color: rgb(187, 247, 208) !important; /* green-200 */
}

/* --- PURPLE / VIOLET family (expansion motion, personas) --- */
html.dark [class*="bg-purple-9"],
html.dark [class*="bg-violet-9"] {
  color: rgb(250, 245, 255) !important; /* purple-50: near-white */
}
html.dark [class*="bg-purple-9"] *,
html.dark [class*="bg-violet-9"] * {
  color: rgb(250, 245, 255) !important;
}
html.dark [class*="bg-purple-9"] h1,
html.dark [class*="bg-purple-9"] h2,
html.dark [class*="bg-purple-9"] h3,
html.dark [class*="bg-purple-9"] h4,
html.dark [class*="bg-violet-9"] h1,
html.dark [class*="bg-violet-9"] h2,
html.dark [class*="bg-violet-9"] h3,
html.dark [class*="bg-violet-9"] h4 {
  color: rgb(233, 213, 255) !important; /* purple-200 */
}

/* --- RED / ROSE family (displacement, risks, disqualifiers) --- */
html.dark [class*="bg-red-9"],
html.dark [class*="bg-rose-9"] {
  color: rgb(254, 242, 242) !important; /* red-50: near-white */
}
html.dark [class*="bg-red-9"] *,
html.dark [class*="bg-rose-9"] * {
  color: rgb(254, 242, 242) !important;
}
html.dark [class*="bg-red-9"] h1,
html.dark [class*="bg-red-9"] h2,
html.dark [class*="bg-red-9"] h3,
html.dark [class*="bg-red-9"] h4,
html.dark [class*="bg-rose-9"] h1,
html.dark [class*="bg-rose-9"] h2,
html.dark [class*="bg-rose-9"] h3,
html.dark [class*="bg-rose-9"] h4 {
  color: rgb(254, 202, 202) !important; /* red-200 */
}

/* --- AMBER / YELLOW family (warnings, medium signals, NDAA) --- */
html.dark [class*="bg-amber-9"],
html.dark [class*="bg-yellow-9"] {
  color: rgb(255, 251, 235) !important; /* amber-50: near-white */
}
html.dark [class*="bg-amber-9"] *,
html.dark [class*="bg-yellow-9"] * {
  color: rgb(255, 251, 235) !important;
}
html.dark [class*="bg-amber-9"] h1,
html.dark [class*="bg-amber-9"] h2,
html.dark [class*="bg-amber-9"] h3,
html.dark [class*="bg-amber-9"] h4,
html.dark [class*="bg-yellow-9"] h1,
html.dark [class*="bg-yellow-9"] h2,
html.dark [class*="bg-yellow-9"] h3,
html.dark [class*="bg-yellow-9"] h4 {
  color: rgb(253, 230, 138) !important; /* amber-200 */
}

/* --- BLUE / SKY / CYAN family (info, TL;DR, POC strategy) --- */
html.dark [class*="bg-blue-9"],
html.dark [class*="bg-sky-9"],
html.dark [class*="bg-cyan-9"] {
  color: rgb(239, 246, 255) !important; /* blue-50: near-white */
}
html.dark [class*="bg-blue-9"] *,
html.dark [class*="bg-sky-9"] *,
html.dark [class*="bg-cyan-9"] * {
  color: rgb(239, 246, 255) !important;
}
html.dark [class*="bg-blue-9"] h1,
html.dark [class*="bg-blue-9"] h2,
html.dark [class*="bg-blue-9"] h3,
html.dark [class*="bg-blue-9"] h4 {
  color: rgb(191, 219, 254) !important; /* blue-200 */
}

/* --- INDIGO family (software products) --- */
html.dark [class*="bg-indigo-9"] {
  color: rgb(238, 242, 255) !important; /* indigo-50: near-white */
}
html.dark [class*="bg-indigo-9"] * {
  color: rgb(238, 242, 255) !important;
}
html.dark [class*="bg-indigo-9"] h1,
html.dark [class*="bg-indigo-9"] h2,
html.dark [class*="bg-indigo-9"] h3,
html.dark [class*="bg-indigo-9"] h4 {
  color: rgb(199, 210, 254) !important; /* indigo-200 */
}

/* --- TEAL family (influencer badges) --- */
html.dark [class*="bg-teal-9"] {
  color: rgb(240, 253, 250) !important; /* teal-50: near-white */
}
html.dark [class*="bg-teal-9"] * {
  color: rgb(240, 253, 250) !important;
}

/* --- ORANGE family (loss prevention) --- */
html.dark [class*="bg-orange-9"] {
  color: rgb(255, 247, 237) !important; /* orange-50: near-white */
}
html.dark [class*="bg-orange-9"] * {
  color: rgb(255, 247, 237) !important;
}

/* --- PINK family --- */
html.dark [class*="bg-pink-9"] {
  color: rgb(253, 242, 248) !important; /* pink-50: near-white */
}
html.dark [class*="bg-pink-9"] * {
  color: rgb(253, 242, 248) !important;
}

/* --- Links inside ANY colored card --- */
html.dark [class*="bg-green-9"] a,
html.dark [class*="bg-emerald-9"] a,
html.dark [class*="bg-purple-9"] a,
html.dark [class*="bg-red-9"] a,
html.dark [class*="bg-amber-9"] a,
html.dark [class*="bg-blue-9"] a,
html.dark [class*="bg-indigo-9"] a,
html.dark [class*="bg-teal-9"] a,
html.dark [class*="bg-orange-9"] a {
  color: rgb(255, 255, 255) !important;
  text-decoration: underline !important;
  text-decoration-color: rgba(255, 255, 255, 0.5) !important;
}
html.dark [class*="bg-green-9"] a:hover,
html.dark [class*="bg-emerald-9"] a:hover,
html.dark [class*="bg-purple-9"] a:hover,
html.dark [class*="bg-red-9"] a:hover,
html.dark [class*="bg-amber-9"] a:hover,
html.dark [class*="bg-blue-9"] a:hover {
  text-decoration-color: rgba(255, 255, 255, 1) !important;
}

/* --- SVG icons inside colored cards should inherit text color --- */
html.dark [class*="bg-green-9"] svg,
html.dark [class*="bg-emerald-9"] svg,
html.dark [class*="bg-purple-9"] svg,
html.dark [class*="bg-red-9"] svg,
html.dark [class*="bg-amber-9"] svg,
html.dark [class*="bg-blue-9"] svg,
html.dark [class*="bg-indigo-9"] svg {
  color: currentColor !important;
}

/* --- Badges/chips INSIDE colored cards: preserve their own bg, just boost text --- */
html.dark [class*="bg-green-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-emerald-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-purple-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-red-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-amber-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-blue-9"] [class*="bg-"][class*="text-"],
html.dark [class*="bg-indigo-9"] [class*="bg-"][class*="text-"] {
  /* Let nested badges with their own bg keep their text color */
}
</style>

  <div class="footer-content">
    <span class="footer-version">v{{ APP_VERSION|default('1.3.0') }}</span>
    <span class="footer-separator">&middot;</span>
    <span class="footer-tagline">Pre-sales intelligence for SLED &amp; commercial</span>
    <span class="footer-separator">&middot;</span>
    <a href="/docs" class="footer-link">Docs</a>
    <span class="footer-separator">&middot;</span>
    <a href="/" class="footer-link">Home</a>
  </div>
</footer>
