# Glossary of terms for auto-tooltipping in brief templates.
# Each term has a `label` (display text / match pattern) and `tooltip` (explanation).
# Terms are matched against brief content and wrapped in <abbr> tags on first occurrence.

terms:

  # --- Existing acronyms (previously hardcoded) ---
  - label: "NDAA"
    tooltip: "NDAA Section 889 — federal law banning certain Chinese-made surveillance equipment (Hikvision, Dahua). Federal funding recipients must comply or lose funding"
  - label: "FRPL"
    tooltip: "Free / Reduced Price Lunch — federal program eligibility used as a poverty indicator. High FRPL districts qualify for Title I funding"
  - label: "FedRAMP"
    tooltip: "FedRAMP — federal cloud security authorization. Verkada has FedRAMP Moderate In Process status"
  - label: "OMNIA"
    tooltip: "OMNIA Partners — cooperative purchasing program allowing public-sector buyers to procure without a full RFP"
  - label: "HGACBuy"
    tooltip: "HGACBuy — Houston-Galveston Area Council cooperative purchasing program"
  - label: "Sourcewell"
    tooltip: "Sourcewell — national cooperative purchasing program for government, education, and nonprofits"
  - label: "COSTARS"
    tooltip: "COSTARS — Pennsylvania cooperative purchasing program (statewide)"
  - label: "TIPS"
    tooltip: "TIPS (The Interlocal Purchasing System) — cooperative purchasing program for public-sector entities"
  - label: "SLED"
    tooltip: "SLED — State, Local, and Education sales segment"
  - label: "POC"
    tooltip: "POC — Proof of Concept, a hands-on trial deployment before purchase. Verkada offers 30-day pelican-case POCs"
  - label: "CIK"
    tooltip: "CIK — Central Index Key, the SEC's unique identifier for public filers"
  - label: "LEAID"
    tooltip: "LEAID — Local Education Agency Identifier, NCES's unique ID for school districts"
  - label: "MEDDIC"
    tooltip: "MEDDIC — Metrics, Economic Buyer, Decision Criteria, Decision Process, Identify Pain, Champion — sales qualification framework"

  # --- Security focus categories ---
  - label: "physical"
    context: "security_focus"
    tooltip: "Physical security focus — the role works on cameras, access control, alarms, intercoms, on-site security operations. Most relevant to Verkada's portfolio."
  - label: "cyber"
    context: "security_focus"
    tooltip: "Cybersecurity focus — the role works on network security, endpoint protection, SIEM, vulnerability management. Adjacent but not core to Verkada."
  - label: "mixed"
    context: "security_focus"
    tooltip: "Mixed physical and cyber security focus — the role spans both domains. Often a leadership role at a smaller org."
  - label: "IT-general"
    context: "security_focus"
    tooltip: "General IT focus — not a security-specialist role. The role may touch security as part of broader IT responsibilities."

  # --- Role level ---
  - label: "frontline"
    context: "role_level"
    tooltip: "Frontline role — individual contributor performing day-to-day operational security work (technicians, specialists, analysts)."
  - label: "manager"
    context: "role_level"
    tooltip: "Manager role — leads a team of frontline workers. First level of management authority."
  - label: "director"
    context: "role_level"
    tooltip: "Director role — senior management with department-level authority and budget."
  - label: "executive"
    context: "role_level"
    tooltip: "Executive role — VP, CISO, CIO, CTO, CSO. Has buying authority for major security purchases."

  # --- Experience level ---
  - label: "entry"
    context: "experience_level"
    tooltip: "Entry-level — typically 0-2 years experience, just out of college or in their first 1-2 jobs."
  - label: "mid"
    context: "experience_level"
    tooltip: "Mid-level — typically 3-7 years experience. Owns projects, mentors junior staff, has technical depth."
  - label: "senior"
    context: "experience_level"
    tooltip: "Senior-level — typically 7-12 years experience. Recognized expertise, often technical lead, may architect solutions."
  - label: "lead"
    context: "experience_level"
    tooltip: "Lead-level — most senior IC role. Often has tech-lead responsibilities, sets standards, mentors seniors."

  # --- Job titles ---
  - label: "Senior Security Systems Specialist"
    context: "job_title"
    tooltip: "Specialist role focused on operating and maintaining physical security systems (cameras, access control, alarms). Often manages NVR/DVR infrastructure, backups, and integrations. Critical role for any Verkada deployment."
  - label: "Security Systems Manager"
    context: "job_title"
    tooltip: "Manager-level role overseeing physical security systems and a team. Often the buyer for cameras, access control, and alarms."
  - label: "Director of Security"
    context: "job_title"
    tooltip: "Department-head role responsible for physical security strategy across an organization. Has budget authority for major deployments."
  - label: "Director of IT"
    context: "job_title"
    tooltip: "IT department head. Often the buyer when physical security falls under IT (common in K-12 and Higher Ed)."
  - label: "Chief Security Officer"
    context: "job_title"
    tooltip: "C-suite executive responsible for both physical and cyber security. Common in large enterprises and government."
  - label: "CSO"
    tooltip: "CSO — Chief Security Officer. C-suite executive responsible for both physical and cyber security."
  - label: "Chief Information Security Officer"
    context: "job_title"
    tooltip: "C-suite executive focused on cybersecurity. May or may not own physical security."
  - label: "CISO"
    tooltip: "CISO — Chief Information Security Officer. C-suite executive focused on cybersecurity. May or may not own physical security."
  - label: "Chief Information Officer"
    context: "job_title"
    tooltip: "C-suite executive responsible for all IT including, in many cases, physical security infrastructure."
  - label: "CIO"
    tooltip: "CIO — Chief Information Officer. C-suite executive responsible for all IT including, in many cases, physical security infrastructure."
  - label: "Facilities Director"
    context: "job_title"
    tooltip: "Department head for buildings, maintenance, and physical infrastructure. Often the buyer for access control and intercoms."
  - label: "Loss Prevention Director"
    context: "job_title"
    tooltip: "Retail/multi-site role focused on shrink reduction, often the buyer for cameras and alarms in retail environments."
  - label: "Superintendent"
    context: "job_title"
    tooltip: "K-12 district CEO. The economic buyer for major district-wide infrastructure investments."

  # --- Hiring signal jargon ---
  - label: "posting_count"
    context: "hiring_signal"
    tooltip: "Number of open job postings detected in the past 90 days. High counts signal team growth and budget."
  - label: "security_team_intensity"
    context: "hiring_signal"
    tooltip: "Composite score of how many security-focused roles are open relative to total hiring. High intensity = active security investment."
  - label: "tech_stack_mentions"
    context: "hiring_signal"
    tooltip: "Technologies named in job descriptions — useful for inferring what software/hardware the team uses today."
  - label: "NVR"
    tooltip: "Network Video Recorder — appliance that records and stores video from IP cameras. Typically replaced by cloud-managed solutions like Verkada Command."
  - label: "DVR"
    tooltip: "Digital Video Recorder — older on-site video storage device, often paired with analog cameras. Common in legacy deployments."
  - label: "JD"
    tooltip: "Job Description — the public job posting text. Often contains explicit pain signals and tech stack clues."
  - label: "FTE"
    tooltip: "Full-Time Equivalent — a unit of staffing measurement. '3,979 FTE teachers' means equivalent of 3,979 full-time teachers."

  # --- Vertical / category labels ---
  - label: "k12"
    context: "vertical"
    tooltip: "K-12 school district — public or private, grades K through 12."
  - label: "higher_ed"
    context: "vertical"
    tooltip: "Higher education institution — universities, colleges, community colleges."
  - label: "healthcare"
    context: "vertical"
    tooltip: "Healthcare provider — hospitals, clinics, ambulatory surgery centers, urgent care."
  - label: "senior_living"
    context: "vertical"
    tooltip: "Senior living facility — assisted living, memory care, skilled nursing facilities."
  - label: "state_local_gov"
    context: "vertical"
    tooltip: "State or local government — city, county, state agencies and departments."
  - label: "federal"
    context: "vertical"
    tooltip: "Federal government — federal agencies, departments, and federally-funded entities."
  - label: "public_safety"
    context: "vertical"
    tooltip: "Public safety agency — police, fire, EMS, correctional facilities."
  - label: "transportation"
    context: "vertical"
    tooltip: "Transportation entity — airports, transit authorities, ports, rail."
  - label: "critical_infrastructure"
    context: "vertical"
    tooltip: "Critical infrastructure operator — utilities, water, energy, telecom."
  - label: "manufacturing"
    context: "vertical"
    tooltip: "Manufacturing — factories, industrial operations, supply chain facilities."
  - label: "retail"
    context: "vertical"
    tooltip: "Retail multi-site — chain stores, big-box, specialty retail, convenience."
  - label: "hospitality"
    context: "vertical"
    tooltip: "Hospitality — hotels, restaurants, entertainment venues."
