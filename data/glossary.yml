# Glossary of terms for auto-tooltipping in brief templates.
# Each term has a `label` (display text / match pattern) and `tooltip` (explanation).
# Terms are matched against brief content and wrapped in <abbr> tags on first occurrence.

terms:

  # --- Existing acronyms (previously hardcoded) ---
  - label: "NDAA"
    tooltip: "NDAA Section 889 — federal law banning certain Chinese-made surveillance equipment (Hikvision, Dahua). Federal funding recipients must comply or lose funding"
  - label: "FRPL"
    tooltip: "Free / Reduced Price Lunch — federal program eligibility used as a poverty indicator. High FRPL districts qualify for Title I funding"
  - label: "FedRAMP"
    tooltip: "FedRAMP — federal cloud security authorization. Verkada has FedRAMP Moderate In Process status"
  - label: "OMNIA"
    tooltip: "OMNIA Partners — cooperative purchasing program allowing public-sector buyers to procure without a full RFP"
  - label: "HGACBuy"
    tooltip: "HGACBuy — Houston-Galveston Area Council cooperative purchasing program"
  - label: "Sourcewell"
    tooltip: "Sourcewell — national cooperative purchasing program for government, education, and nonprofits"
  - label: "COSTARS"
    tooltip: "COSTARS — Pennsylvania cooperative purchasing program (statewide)"
  - label: "TIPS"
    tooltip: "TIPS (The Interlocal Purchasing System) — cooperative purchasing program for public-sector entities"
  - label: "SLED"
    tooltip: "SLED — State, Local, and Education sales segment"
  - label: "POC"
    tooltip: "POC — Proof of Concept, a hands-on trial deployment before purchase. Verkada offers 30-day pelican-case POCs"
  - label: "CIK"
    tooltip: "CIK — Central Index Key, the SEC's unique identifier for public filers"
  - label: "LEAID"
    tooltip: "LEAID — Local Education Agency Identifier, NCES's unique ID for school districts"
  - label: "MEDDIC"
    tooltip: "MEDDIC — Metrics, Economic Buyer, Decision Criteria, Decision Process, Identify Pain, Champion — sales qualification framework"
  - label: "NVR"
    tooltip: "Network Video Recorder — appliance that records and stores video from IP cameras. Typically replaced by cloud-managed solutions like Verkada Command."
  - label: "DVR"
    tooltip: "Digital Video Recorder — older on-site video storage device, often paired with analog cameras. Common in legacy deployments."
  - label: "JD"
    tooltip: "Job Description — the public job posting text. Often contains explicit pain signals and tech stack clues."
  - label: "FTE"
    tooltip: "Full-Time Equivalent — a unit of staffing measurement. '3,979 FTE teachers' means equivalent of 3,979 full-time teachers."
  - label: "CSO"
    tooltip: "CSO — Chief Security Officer. C-suite executive responsible for both physical and cyber security."
  - label: "CISO"
    tooltip: "CISO — Chief Information Security Officer. C-suite executive focused on cybersecurity. May or may not own physical security."
  - label: "CIO"
    tooltip: "CIO — Chief Information Officer. C-suite executive responsible for all IT including, in many cases, physical security infrastructure."
  - label: "VMS"
    tooltip: "Video Management System — software platform for managing and viewing surveillance camera feeds. Verkada Command is a cloud-native VMS."
  - label: "RFP"
    tooltip: "Request for Proposal — formal procurement process where buyers solicit vendor bids. Cooperative purchasing bypasses this."
  - label: "GTM"
    tooltip: "Go-To-Market — the sales strategy for approaching an account: who to target, what products, which procurement path."
  - label: "ACV"
    tooltip: "Annual Contract Value — the annualized revenue from a customer contract. Used to size deals."
  - label: "ARR"
    tooltip: "Annual Recurring Revenue — total annualized subscription revenue. Verkada is a SaaS/subscription model."

  # --- Retail / Loss Prevention ---
  - label: "ORC"
    tooltip: "Organized Retail Crime — coordinated theft operations targeting retail stores, often involving multiple actors stealing for resale. Major shrink driver."
  - label: "Shrink"
    tooltip: "Retail term for inventory loss from theft, fraud, damage, and administrative error. Industry average ~1.6% of sales; loss prevention teams aim to reduce it."
  - label: "LP"
    tooltip: "Loss Prevention — retail security function responsible for reducing shrink, investigating theft, and protecting employees and customers."
  - label: "AP"
    tooltip: "Asset Protection — term used by many large retailers (Walmart, Target) for loss prevention. Same function, different name."
  - label: "POS"
    tooltip: "Point of Sale — checkout terminal. Security cameras typically cover POS for fraud detection and theft prevention."
  - label: "BORIS"
    tooltip: "Buy Online Return In Store — returns flow that's a common shrink vector due to return fraud."
  - label: "BOPIS"
    tooltip: "Buy Online Pickup In Store — fulfillment flow requiring security at pickup points."
  - label: "ECR"
    tooltip: "Exception-Based Reporting — analytics that flag unusual POS transactions for LP investigation."
  - label: "Sweethearting"
    tooltip: "Cashier giving products to friends/family without scanning. Detected via camera + POS data correlation."

  # --- Manufacturing / Industrial ---
  - label: "PPE"
    tooltip: "Personal Protective Equipment — safety gear (hard hats, vests, glasses). Camera analytics can detect PPE compliance."
  - label: "OSHA"
    tooltip: "Occupational Safety and Health Administration — federal workplace safety regulator. Manufacturing accidents trigger OSHA investigations."
  - label: "ESD"
    tooltip: "Electrostatic Discharge — risk in electronics manufacturing that drives PPE and grounding requirements."

  # --- Hospitality / Hotels ---
  - label: "RevPAR"
    tooltip: "Revenue Per Available Room — key hotel performance metric. Security investments often justified by RevPAR impact."
  - label: "ADR"
    tooltip: "Average Daily Rate — average room price. Premium properties demand premium security infrastructure."
  - label: "FOH"
    tooltip: "Front of House — guest-facing areas (lobby, restaurants). High camera coverage for guest safety."
  - label: "BOH"
    tooltip: "Back of House — employee-only areas (kitchen, housekeeping storage). Camera coverage for theft prevention."

  # --- Senior Living ---
  - label: "ADL"
    tooltip: "Activities of Daily Living — eating, bathing, dressing. Functional independence metric for residents."
  - label: "SNF"
    tooltip: "Skilled Nursing Facility — higher acuity care, often post-acute rehab. Strict regulatory environment (CMS)."
  - label: "LTC"
    tooltip: "Long-Term Care — umbrella term for assisted living, memory care, skilled nursing facilities."
  - label: "Elopement"
    tooltip: "Senior living term for a resident leaving the facility unsafely (wandering). Camera analytics + access control prevent this."
  - label: "Wandering"
    tooltip: "When a resident with cognitive impairment leaves their unit or facility without staff knowledge. Major safety/liability risk."

  # --- Transportation / Airports ---
  - label: "TWIC"
    tooltip: "Transportation Worker Identification Credential — federal ID required for unescorted access to secure maritime/transportation areas."
  - label: "SIDA"
    tooltip: "Security Identification Display Area — secure parts of an airport requiring badged access (gate areas, ramps)."
  - label: "AOA"
    tooltip: "Aircraft Operations Area — airport ramp/taxiway zones. Restricted access, camera coverage critical."

  # --- Critical Infrastructure / Utilities ---
  - label: "NERC"
    tooltip: "North American Electric Reliability Corporation — sets and enforces CIP (Critical Infrastructure Protection) standards for the bulk electric system."
  - label: "CIP"
    tooltip: "Critical Infrastructure Protection — NERC regulatory standards for physical and cyber security of bulk electric system assets."
  - label: "BES"
    tooltip: "Bulk Electric System — major power infrastructure regulated by NERC. CIP standards apply."
  - label: "SCADA"
    tooltip: "Supervisory Control and Data Acquisition — industrial control system for monitoring/controlling infrastructure (water, power, gas)."
  - label: "WTP"
    tooltip: "Water Treatment Plant — drinking water facility. Critical infrastructure, security-sensitive."
  - label: "WWTP"
    tooltip: "Wastewater Treatment Plant — sewage processing facility. Critical infrastructure."

  # --- Public Safety / Law Enforcement ---
  - label: "BWC"
    tooltip: "Body-Worn Camera — police-issued cameras worn by officers. Distinct from facility surveillance but often integrated."
  - label: "ALPR"
    tooltip: "Automatic License Plate Reader — camera that captures and reads license plates. Used in investigations and access control."
  - label: "CAD"
    tooltip: "Computer-Aided Dispatch — 911 call routing system. Integrated with body cams and surveillance for incident response."
  - label: "PSAP"
    tooltip: "Public Safety Answering Point — 911 call center. Camera coverage for staff safety and incident review."

  # --- Federal-specific ---
  - label: "ATO"
    tooltip: "Authority to Operate — federal approval to deploy a system. Verkada FedRAMP Moderate enables ATO for federal customers."
  - label: "RMF"
    tooltip: "Risk Management Framework — NIST process for managing federal IT risk."
  - label: "SCIF"
    tooltip: "Sensitive Compartmented Information Facility — secure room for classified work. Strict access control required."
  - label: "CONOPS"
    tooltip: "Concept of Operations — high-level system design document required for federal acquisitions."
  - label: "FIPS"
    tooltip: "Federal Information Processing Standards — encryption standards required for federal systems. Verkada cameras support FIPS 140-2."

  # --- Security focus categories ---
  - label: "physical"
    context: "security_focus"
    tooltip: "Physical security focus — the role works on cameras, access control, alarms, intercoms, on-site security operations. Most relevant to Verkada's portfolio."
  - label: "cyber"
    context: "security_focus"
    tooltip: "Cybersecurity focus — the role works on network security, endpoint protection, SIEM, vulnerability management. Adjacent but not core to Verkada."
  - label: "mixed"
    context: "security_focus"
    tooltip: "Mixed physical and cyber security focus — the role spans both domains. Often a leadership role at a smaller org."
  - label: "IT-general"
    context: "security_focus"
    tooltip: "General IT focus — not a security-specialist role. The role may touch security as part of broader IT responsibilities."

  # --- Role level ---
  - label: "frontline"
    context: "role_level"
    tooltip: "Frontline role — individual contributor performing day-to-day operational security work (technicians, specialists, analysts)."
  - label: "manager"
    context: "role_level"
    tooltip: "Manager role — leads a team of frontline workers. First level of management authority."
  - label: "director"
    context: "role_level"
    tooltip: "Director role — senior management with department-level authority and budget."
  - label: "executive"
    context: "role_level"
    tooltip: "Executive role — VP, CISO, CIO, CTO, CSO. Has buying authority for major security purchases."

  # --- Experience level ---
  - label: "entry"
    context: "experience_level"
    tooltip: "Entry-level — typically 0-2 years experience, just out of college or in their first 1-2 jobs."
  - label: "mid"
    context: "experience_level"
    tooltip: "Mid-level — typically 3-7 years experience. Owns projects, mentors junior staff, has technical depth."
  - label: "senior"
    context: "experience_level"
    tooltip: "Senior-level — typically 7-12 years experience. Recognized expertise, often technical lead, may architect solutions."
  - label: "lead"
    context: "experience_level"
    tooltip: "Lead-level — most senior IC role. Often has tech-lead responsibilities, sets standards, mentors seniors."

  # --- Job titles ---
  - label: "Senior Security Systems Specialist"
    context: "job_title"
    tooltip: "Specialist role focused on operating and maintaining physical security systems (cameras, access control, alarms)."
  - label: "Security Systems Manager"
    context: "job_title"
    tooltip: "Manager-level role overseeing physical security systems and a team. Often the buyer for cameras, access control, and alarms."
  - label: "Director of Security"
    context: "job_title"
    tooltip: "Department-head role responsible for physical security strategy across an organization. Has budget authority."
  - label: "Director of IT"
    context: "job_title"
    tooltip: "IT department head. Often the buyer when physical security falls under IT (common in K-12 and Higher Ed)."
  - label: "Chief Security Officer"
    context: "job_title"
    tooltip: "C-suite executive responsible for both physical and cyber security."
  - label: "Chief Information Security Officer"
    context: "job_title"
    tooltip: "C-suite executive focused on cybersecurity. May or may not own physical security."
  - label: "Chief Information Officer"
    context: "job_title"
    tooltip: "C-suite executive responsible for all IT including, in many cases, physical security infrastructure."
  - label: "Facilities Director"
    context: "job_title"
    tooltip: "Department head for buildings, maintenance, and physical infrastructure. Often the buyer for access control and intercoms."
  - label: "Loss Prevention Director"
    context: "job_title"
    tooltip: "Retail/multi-site role focused on shrink reduction, often the buyer for cameras and alarms in retail environments."
  - label: "Superintendent"
    context: "job_title"
    tooltip: "K-12 district CEO. The economic buyer for major district-wide infrastructure investments."

  # --- Hiring signal jargon ---
  - label: "posting_count"
    context: "hiring_signal"
    tooltip: "Number of open job postings detected in the past 90 days. High counts signal team growth and budget."
  - label: "security_team_intensity"
    context: "hiring_signal"
    tooltip: "Composite score of how many security-focused roles are open relative to total hiring. High intensity = active security investment."
  - label: "tech_stack_mentions"
    context: "hiring_signal"
    tooltip: "Technologies named in job descriptions — useful for inferring what software/hardware the team uses today."

  # --- Vertical / category labels ---
  - label: "k12"
    context: "vertical"
    tooltip: "K-12 school district — public or private, grades K through 12."
  - label: "higher_ed"
    context: "vertical"
    tooltip: "Higher education institution — universities, colleges, community colleges."
  - label: "healthcare"
    context: "vertical"
    tooltip: "Healthcare provider — hospitals, clinics, ambulatory surgery centers, urgent care."
  - label: "senior_living"
    context: "vertical"
    tooltip: "Senior living facility — assisted living, memory care, skilled nursing facilities."
  - label: "state_local_gov"
    context: "vertical"
    tooltip: "State or local government — city, county, state agencies and departments."
  - label: "federal"
    context: "vertical"
    tooltip: "Federal government — federal agencies, departments, and federally-funded entities."
  - label: "public_safety"
    context: "vertical"
    tooltip: "Public safety agency — police, fire, EMS, correctional facilities."
  - label: "transportation"
    context: "vertical"
    tooltip: "Transportation entity — airports, transit authorities, ports, rail."
  - label: "critical_infrastructure"
    context: "vertical"
    tooltip: "Critical infrastructure operator — utilities, water, energy, telecom."
  - label: "manufacturing"
    context: "vertical"
    tooltip: "Manufacturing — factories, industrial operations, supply chain facilities."
  - label: "retail"
    context: "vertical"
    tooltip: "Retail multi-site — chain stores, big-box, specialty retail, convenience."
  - label: "hospitality"
    context: "vertical"
    tooltip: "Hospitality — hotels, restaurants, entertainment venues."

  # --- Common pain pattern phrases (appear humanized in chips) ---
  - label: "high_camera_count_low_usability"
    context: "pain_phrase"
    tooltip: "Pain: stores have many cameras but lack analytics or unified view — teams can't actually use the footage effectively. Common in legacy DVR/NVR deployments."
  - label: "lp_team_cant_review_footage_remotely"
    context: "pain_phrase"
    tooltip: "Pain: Loss Prevention team is tied to on-site DVR/NVR systems and can't access footage from remote locations or HQ. Verkada Command solves this with cloud-native remote access."
  - label: "inconsistent_systems_across_stores"
    context: "pain_phrase"
    tooltip: "Pain: different security systems at different store locations create operational friction — separate logins, training, configurations, vendors."
  - label: "orc_exposure"
    context: "pain_phrase"
    tooltip: "Pain: high exposure to Organized Retail Crime. ORC drives need for advanced analytics, license plate recognition, and inter-store investigation tools."
  - label: "aging_analog_cameras"
    context: "pain_phrase"
    tooltip: "Pain: old analog camera infrastructure with degraded image quality, limited coverage, and expensive maintenance. Prime for cloud-native replacement."
  - label: "no_centralized_security_dashboard"
    context: "pain_phrase"
    tooltip: "Pain: no single-pane-of-glass view across all locations. Security teams must log into separate systems per site."
  - label: "compliance_pressure_ndaa"
    context: "pain_phrase"
    tooltip: "Pain: pressure to replace non-compliant Chinese-manufactured cameras (Hikvision, Dahua) to maintain federal funding eligibility."
  - label: "school_safety_incidents"
    context: "pain_phrase"
    tooltip: "Pain: recent safety incidents at schools driving urgency for better surveillance, access control, and emergency response."
  - label: "visitor_management_gaps"
    context: "pain_phrase"
    tooltip: "Pain: inability to track who enters campus, when, and where. Verkada Guest and access control address this."
  - label: "multi_site_management_complexity"
    context: "pain_phrase"
    tooltip: "Pain: managing security across many locations (schools, stores, clinics) with different systems and processes at each."
  - label: "remote_monitoring_limitations"
    context: "pain_phrase"
    tooltip: "Pain: security team can only view footage on-site via local NVR/DVR. No remote access from HQ or mobile."
  - label: "high_false_alarm_rate"
    context: "pain_phrase"
    tooltip: "Pain: existing alarm system generates too many false alarms, wasting guard and police response. Smart sensors reduce false alarms."
  - label: "guard_force_cost_pressure"
    context: "pain_phrase"
    tooltip: "Pain: rising costs of manned security guards driving interest in camera analytics and remote monitoring to reduce headcount."
  - label: "parking_lot_incidents"
    context: "pain_phrase"
    tooltip: "Pain: theft, vandalism, or safety incidents in parking areas. Camera coverage and ALPR address this."
  - label: "loading_dock_theft"
    context: "pain_phrase"
    tooltip: "Pain: theft or diversion at loading docks. Camera coverage with analytics detects unauthorized access."
  - label: "emergency_lockdown_capability"
    context: "pain_phrase"
    tooltip: "Pain: inability to quickly lock down a building or campus during emergencies. Verkada access control enables instant lockdown."
  - label: "resident_safety_monitoring"
    context: "pain_phrase"
    tooltip: "Pain: difficulty monitoring resident safety in senior living — fall detection, wandering, elopement prevention."
  - label: "tailgating_prevention"
    context: "pain_phrase"
    tooltip: "Pain: unauthorized people following authorized entrants through access-controlled doors. Camera + access control integration detects this."
  - label: "perimeter_intrusion"
    context: "pain_phrase"
    tooltip: "Pain: unauthorized entry through facility perimeter. Outdoor cameras with analytics and environmental sensors address this."
  - label: "workplace_violence_prevention"
    context: "pain_phrase"
    tooltip: "Pain: need for early detection and response to workplace violence incidents. Camera analytics + access control + intercoms."
  - label: "supply_chain_security"
    context: "pain_phrase"
    tooltip: "Pain: securing goods in transit and at distribution centers. Camera coverage at warehouses and loading areas."
  - label: "shoplifting"
    context: "pain_phrase"
    tooltip: "Pain: theft by customers at retail stores. Camera-enabled investigation is core LP workflow."
  - label: "internal_theft"
    context: "pain_phrase"
    tooltip: "Pain: theft by employees. LP investigates with help from camera footage and POS data."
