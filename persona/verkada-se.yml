# =============================================================================
# Displacement Targets — Incumbents Verkada Commonly Replaces
# =============================================================================

displacement_targets:
  - vendor: Avigilon
    parent: Motorola
    common_pain:
      - licensing_cost
      - on_prem_burden
      - server_hardware_refresh_cycles
      - ACC_software_complexity
    verkada_counter: >
      No VMS server, no per-camera license. Command is included.
      Compare ACC7 server rack cost vs zero-appliance Verkada deployment.

  - vendor: Genetec
    common_pain:
      - on_prem_complexity
      - IT_burden
      - Security_Center_requires_dedicated_infrastructure
      - Federation_complexity_at_scale
    verkada_counter: >
      Genetec Federation across sites requires server at each site.
      Verkada Command federates natively — no per-site server.

  - vendor: Milestone
    common_pain:
      - on_prem_burden
      - integration_cost
      - XProtect_licensing_tiers_confusing
    verkada_counter: >
      Milestone sells software; customer still buys servers, storage, and IT labor.
      Verkada includes compute, storage, and management in one subscription.

  - vendor: Lenel
    parent: Carrier
    common_pain:
      - legacy_access_control
      - support_responsiveness
      - OnGuard_aging_architecture
      - requires_trained_integrator_for_changes
    verkada_counter: >
      Lenel OnGuard changes require integrator truck rolls.
      Verkada access policy changes are self-serve in Command, real-time.

  - vendor: Hikvision
    common_pain:
      - NDAA_non_compliance
      - federal_ban
      - FCC_covered_list
      - supply_chain_risk
    verkada_counter: >
      Hikvision is on the FCC Covered List. Any org receiving federal
      funding or pursuing federal contracts must rip and replace.
      Verkada is NDAA-compliant, manufactured outside China.

  - vendor: Dahua
    common_pain:
      - NDAA_non_compliance
      - federal_ban
      - FCC_covered_list
      - supply_chain_risk
    verkada_counter: >
      Same NDAA/FCC exposure as Hikvision. Dahua OEMs under many brand
      names (Amcrest, Lorex consumer) — check hardware MAC addresses.

  - vendor: March_Networks
    common_pain:
      - banking_vertical_lock_in
      - aging_platform
      - limited_analytics
    verkada_counter: >
      March Networks is entrenched in banking but stagnating on AI analytics.
      Verkada's edge analytics and open API offer a modernization path.

  - vendor: Brivo
    common_pain:
      - access_only_no_video
      - limited_platform_breadth
    verkada_counter: >
      Brivo is cloud access but no video. Verkada offers access + video
      + sensors in one platform — eliminates a vendor.

# =============================================================================
# Triggers — Detection Signals → Discovery Questions
# =============================================================================
# Each trigger defines:
#   id:                 Unique identifier, referenced by synthesizer
#   detect_signals:     What the research subagents look for
#   weight:             Priority score (0.0–1.0); higher = surface first
#   discovery_templates: Question templates filled with brief-specific data
#
# The synthesizer matches detected signals → trigger IDs → templates → fills
# with company-specific details. Free-form question generation is prohibited.
# =============================================================================

triggers:
  # --- Triggers from kickoff spec ---

  - id: ndaa_compliance_pressure
    detect_signals:
      keywords:
        - "federal funding"
        - "DoD contract"
        - "Hikvision"
        - "Dahua"
        - "NDAA"
        - "FCC Covered List"
        - "government contract"
        - "GSA schedule"
        - "Title I"
        - "FRPL"
        - "free and reduced lunch"
        - "E-Rate"
      nces_signals:
        - title_i_participation
        - frpl_above_threshold
        - has_federal_funding
      source_hints:
        - sec_filings
        - news
        - job_postings
        - nces
    weight: 0.9
    discovery_templates:
      - "I noticed {company} receives federal funding through {program}. Are existing cameras NDAA-compliant, or has that come up in audits?"
      - "Hikvision/Dahua replacements are 2025–2026 budget items for many {vertical} orgs. Where are you in that conversation?"
      - "Has your procurement team flagged the FCC Covered List when reviewing physical security vendors?"
      - "With {frpl_percentage}% FRPL and 100% Title I status, {company} receives significant federal funding. Has procurement reviewed whether existing security hardware meets NDAA requirements?"

  - id: incident_recent_12mo
    detect_signals:
      keywords:
        - "breach"
        - "incident"
        - "lawsuit"
        - "shooting"
        - "violence"
        - "theft"
        - "workplace violence"
        - "security incident"
        - "break-in"
        - "HIPAA breach"
        - "data breach"
        - "OCR investigation"
      hhs_signals:
        - breach_count_above_zero
        - large_breach_500_plus
      clery_signals:
        - crime_increase_yoy
        - reportable_incident
      source_hints:
        - news
        - sec_filings
        - hhs
        - clery
    weight: 1.0
    discovery_templates:
      - "I saw the {incident_type} coverage from {month}. How has that shifted security investment posture internally?"
      - "What did the post-incident review surface as the primary gap — detection, response time, or footage retrieval?"
      - "After {incident_type}, did leadership set a timeline for remediation, or is it still in planning?"
      - "{company} reported {breach_count} breach(es) affecting {individuals_affected} individuals to HHS OCR. Has that driven any physical access control remediation?"

  - id: hiring_security_intensity
    detect_signals:
      job_titles:
        - "Director of Security"
        - "Security Operations"
        - "Physical Security Manager"
        - "VP of Safety"
        - "Global Security"
        - "Security Systems Engineer"
        - "Loss Prevention"
      source_hints:
        - job_postings
    weight: 0.8
    discovery_templates:
      - "I see you're building out the security team — {specific_role} posted {timeframe}. What's driving that investment?"
      - "When a new {specific_role} comes in, they typically audit existing infrastructure in the first 90 days. Is that happening?"
      - "Is the {specific_role} hire reporting into security, facilities, or IT? That usually signals where budget sits."

  - id: capital_project_signal
    detect_signals:
      keywords:
        - "new building"
        - "expansion"
        - "lease signed"
        - "groundbreaking"
        - "new campus"
        - "renovation"
        - "construction"
        - "new facility"
        - "headquarters relocation"
      source_hints:
        - news
        - sec_filings
        - press_releases
    weight: 0.7
    discovery_templates:
      - "When does {project_name} come online? Are security infrastructure decisions for that site already locked in, or still in design?"
      - "New builds are a clean-sheet opportunity — is the security spec for {project_name} being written by facilities, IT, or an integrator?"
      - "Are you standardizing the new site on the same security platform as existing locations, or evaluating fresh?"

  # --- Additional triggers (expanded taxonomy) ---

  - id: legacy_nvr_dvr_refresh
    detect_signals:
      keywords:
        - "NVR"
        - "DVR"
        - "video management system"
        - "VMS"
        - "server refresh"
        - "end of life"
        - "end of support"
        - "camera upgrade"
        - "surveillance upgrade"
        - "analog cameras"
        - "storage capacity"
      job_titles:
        - "Security Systems Integrator"
        - "CCTV Technician"
      source_hints:
        - job_postings
        - news
        - crt_sh
    weight: 0.85
    discovery_templates:
      - "How old is the current NVR/DVR infrastructure at {company}? Are you hitting storage or performance limits that are forcing a refresh conversation?"
      - "When your VMS servers hit end-of-life, who owns that refresh — IT or physical security? That budget conversation usually reveals a lot."
      - "Are you factoring in the ongoing server maintenance and patching costs, or just the upfront hardware replacement when you budget for the NVR refresh?"

  - id: multi_site_sprawl
    detect_signals:
      keywords:
        - "locations across"
        - "multi-site"
        - "nationwide"
        - "regional offices"
        - "branch offices"
        - "distributed"
        - "franchise"
        - "portfolio"
        - "campuses"
      numeric_signals:
        site_count_above: 10
      nces_signals:
        - school_count_above_10
      clery_signals:
        - campus_count_above_3
      source_hints:
        - sec_filings
        - news
        - company_website
        - nces
        - clery
    weight: 0.75
    discovery_templates:
      - "{company} operates {site_count} locations. Are those running the same security platform, or did each site choose its own over the years?"
      - "When there's an incident at a remote site, can your security team pull footage without calling someone on-site or VPN-ing into a local NVR?"
      - "Standardizing {site_count} locations on one platform is a big project. What would need to be true for that to land on next year's budget?"
      - "With {school_count} schools across the district, does each school manage its own cameras, or is there a centralized view from the district office?"

  - id: cloud_transformation_initiative
    detect_signals:
      keywords:
        - "cloud migration"
        - "digital transformation"
        - "cloud-first"
        - "SaaS consolidation"
        - "zero trust"
        - "hybrid cloud"
        - "AWS"
        - "Azure"
        - "data center decommission"
      job_titles:
        - "Cloud Architect"
        - "VP of Digital Transformation"
        - "Director of IT Modernization"
      source_hints:
        - job_postings
        - sec_filings
        - crt_sh
        - github
    weight: 0.7
    discovery_templates:
      - "I see {company} is investing heavily in cloud — {specific_signal}. Has physical security been included in that cloud-first conversation, or is it still the last on-prem holdout?"
      - "If IT is decommissioning on-prem servers for everything else, how do they feel about maintaining NVR servers just for cameras?"
      - "Your {cloud_initiative} suggests a preference for SaaS-managed infrastructure. Is physical security on the roadmap for that migration, or has no one raised it yet?"

  - id: vendor_consolidation_signal
    detect_signals:
      keywords:
        - "vendor consolidation"
        - "reduce vendors"
        - "single pane of glass"
        - "platform consolidation"
        - "simplify"
        - "too many tools"
        - "integration fatigue"
        - "total cost of ownership"
        - "TCO review"
      source_hints:
        - sec_filings
        - news
        - job_postings
    weight: 0.7
    discovery_templates:
      - "I saw references to vendor consolidation at {company}. How many separate physical security vendors are you managing today — video, access, alarms, intercoms?"
      - "When you add up licensing, maintenance contracts, and IT time across {vendor_count} security vendors, has anyone calculated the total cost of ownership?"
      - "If you could manage video, access control, and environmental sensors from one login, what would that free up for your team?"

  - id: regulatory_compliance_expansion
    detect_signals:
      keywords:
        - "HIPAA audit"
        - "FERPA compliance"
        - "SOX"
        - "PCI DSS"
        - "Joint Commission"
        - "CMS survey"
        - "accreditation"
        - "audit findings"
        - "compliance remediation"
        - "Clery Act"
      source_hints:
        - sec_filings
        - news
    weight: 0.8
    discovery_templates:
      - "I noticed {company} is navigating {regulation} requirements. Does your current security infrastructure produce the audit trail and footage retention that compliance needs?"
      - "When {regulation} auditors ask for video evidence of physical access controls, how long does it take your team to pull that footage today?"
      - "Are compliance requirements driving any of your physical security investment decisions this cycle, or is it still siloed from the security budget?"

  - id: executive_leadership_change
    detect_signals:
      keywords:
        - "new CEO"
        - "new CTO"
        - "new CFO"
        - "new CSO"
        - "new CISO"
        - "new VP"
        - "leadership change"
        - "appointed"
        - "joined as"
        - "hired as"
      source_hints:
        - news
        - press_releases
        - sec_filings
    weight: 0.65
    discovery_templates:
      - "I saw {executive_name} joined as {title} in {month}. New leaders often audit existing vendor relationships in their first quarter — has that process started for physical security?"
      - "When a new {title} comes in, they usually inherit legacy contracts. Has {executive_name} signaled any priorities around infrastructure modernization?"

  - id: insurance_or_risk_pressure
    detect_signals:
      keywords:
        - "insurance premium"
        - "risk management"
        - "underwriting"
        - "loss ratio"
        - "claims"
        - "property insurance"
        - "liability"
        - "risk mitigation"
      source_hints:
        - sec_filings
        - news
    weight: 0.65
    discovery_templates:
      - "Some {vertical} organizations are seeing insurance carriers require specific security controls — cameras, access logs — for renewal. Is that coming up at {company}?"
      - "Has your risk management team quantified how upgraded physical security infrastructure could impact insurance premiums or claims costs?"

  # --- SLED-specific triggers ---

  - id: clery_crime_trend
    detect_signals:
      keywords:
        - "Clery Act"
        - "campus crime"
        - "annual security report"
        - "crime statistics"
        - "campus safety"
      clery_signals:
        - crime_increase_yoy
        - reportable_incident_count_above_threshold
      source_hints:
        - clery
        - news
    weight: 0.85
    discovery_templates:
      - "Your Clery report shows {crime_type} incidents trending {direction} over the past {years} years. Has that data driven any physical security investment conversations?"
      - "Clery reporting requirements mean every incident has documentation and audit overhead. Is your current camera system producing the evidence quality that compliance needs?"
      - "When campus safety leadership reviews the annual Clery data, what's the gap between what they want to prevent and what the current security infrastructure can detect?"

  - id: frpl_federal_funding
    detect_signals:
      nces_signals:
        - frpl_percentage_above_50
        - title_i_all_schools
        - has_federal_funding
      keywords:
        - "Title I"
        - "free and reduced lunch"
        - "FRPL"
        - "federal funding"
        - "E-Rate"
        - "ESSER"
        - "school safety grant"
      source_hints:
        - nces
        - news
    weight: 0.8
    discovery_templates:
      - "{company} has {frpl_percentage}% FRPL with all {school_count} schools qualifying for Title I. Are you leveraging federal safety grants (STOP School Violence, ESSER) for physical security upgrades?"
      - "Districts with {frpl_percentage}%+ FRPL often have the highest safety needs but tightest budgets. Has the district explored NDAA-compliant vendors that qualify for federal procurement vehicles?"
      - "With 100% Title I status, {company} is subject to federal funding compliance including NDAA hardware requirements. Has that been factored into security vendor selection?"

  - id: campus_safety_compliance
    detect_signals:
      keywords:
        - "Alyssa's Law"
        - "school safety"
        - "panic button"
        - "SRO"
        - "school resource officer"
        - "weapon detection"
        - "active shooter"
        - "lockdown"
        - "safe school plan"
      source_hints:
        - news
        - nces
        - clery
    weight: 0.9
    discovery_templates:
      - "Georgia's school safety requirements are expanding. How is {company} approaching panic button/emergency notification compliance across {school_count} schools?"
      - "Does {company} have centralized lockdown capability across all {school_count} schools, or is it building-by-building?"
      - "School safety is a board-level priority for most districts with {enrollment} students. What's the current state of {company}'s security infrastructure assessment?"

  - id: active_security_rfp
    detect_signals:
      keywords:
        - "RFP"
        - "solicitation"
        - "bid"
        - "procurement"
        - "video surveillance"
        - "access control"
        - "security cameras"
        - "physical security"
      procurement_signals:
        - active_rfp_matching_category
        - recent_award_matching_category
      source_hints:
        - sourcewell
        - tips
        - ga_procurement
        - atlanta_procurement
    weight: 0.95
    discovery_templates:
      - "I see active solicitations on {procurement_vehicle} for {rfp_category}. Is {company} evaluating responses, or has a shortlist been established?"
      - "The {procurement_vehicle} contract for {rfp_category} provides pre-negotiated pricing. Has {company}'s procurement team evaluated cooperative purchasing as a faster path than full RFP?"
      - "Sourcewell and TIPS contracts are available for physical security — Verkada is on both. Has your procurement team explored cooperative purchasing to bypass the full RFP cycle?"

  - id: incumbent_contract_expiring
    detect_signals:
      keywords:
        - "contract expir"
        - "contract renewal"
        - "RFP replacement"
        - "end of contract"
        - "vendor transition"
      procurement_signals:
        - contract_expiration_within_12mo
      source_hints:
        - ga_procurement
        - atlanta_procurement
        - news
    weight: 0.85
    discovery_templates:
      - "If the current {incumbent_vendor} contract is up for renewal, what would need to change for {company} to evaluate alternatives?"
      - "Contract transitions are the lowest-friction moment to modernize. Is {company} planning to re-bid the security contract or extend the incumbent?"

  - id: sole_source_opportunity
    detect_signals:
      keywords:
        - "sole source"
        - "sole provider"
        - "single source"
        - "cooperative contract"
        - "piggyback"
        - "interlocal agreement"
      procurement_signals:
        - sole_source_justification_available
        - cooperative_contract_available
      source_hints:
        - sourcewell
        - tips
        - ga_procurement
    weight: 0.7
    discovery_templates:
      - "Verkada holds Sourcewell and TIPS cooperative contracts. Has {company}'s procurement team considered cooperative purchasing as a sole-source path?"
      - "Georgia allows cooperative purchasing through Sourcewell. This can bypass the full RFP process — is that on your procurement team's radar?"

