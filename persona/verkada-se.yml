# =============================================================================
# verkada-se.yml — Structured Rule Engine for Verkada SE Pre-Sales Research
# =============================================================================
# This file is THE leverage file. Every synthesis task loads it as ground truth.
# Do not invent triggers, personas, or templates outside this file.
# If you find a gap, surface it as a comment — do not fill it silently.
# =============================================================================

product:
  name: Verkada
  lines:
    - Cameras
    - Access Control
    - Alarms
    - Sensors
    - Intercoms
    - Guest
    - Mailroom
    - Workplace
  unified_under: Command platform
  positioning: >
    Cloud-managed physical security platform; replaces on-prem NVR/DVR
    and legacy access control with a single pane of glass. No local
    servers, no on-prem VMS licensing. Managed via browser or mobile.
  key_differentiators:
    - cloud_native: No NVR/DVR, no on-prem servers. Edge storage on cameras + cloud management.
    - single_platform: Video, access, alarms, sensors, intercoms, workplace — one Command login.
    - zero_appliance: No dedicated server hardware to rack, patch, or replace.
    - ai_at_edge: On-camera analytics (people, vehicles, license plates, PPE) without GPU servers.
    - open_api: REST API for integrations; no proprietary middleware.
    - ndaa_compliant: All hardware manufactured in NDAA-compliant facilities.
    - automatic_updates: Firmware and software pushed OTA, no truck rolls for patching.

