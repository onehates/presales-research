      - SSO

# =============================================================================
# Disqualifiers — Flags That Should Kill an Opportunity
# =============================================================================
# If any of these are detected, the brief must flag them prominently.
# They don't mean "stop research" — they mean "SE needs to know immediately."
# =============================================================================

disqualifiers:
  - id: on_prem_only_mandate
    description: >
      Organization has a documented policy or regulatory requirement
      prohibiting cloud-managed security infrastructure. No path to Verkada
      without a policy exception.

  - id: existing_3yr_contract_just_signed
    description: >
      Recently signed a 3+ year contract with a competing vendor.
      Displacement timeline is 2–3 years out minimum. Park, don't pursue.

  - id: sub_50_employee_org
    description: >
      Organization is below Verkada's typical deal floor. May be viable
      for SMB motion but not SE-led enterprise sales.

  - id: chinese_gov_affiliated
    description: >
      Entity is affiliated with Chinese government or military.
      Verkada will not sell. Hard disqualifier.

  - id: active_verkada_customer
    description: >
      Already a Verkada customer. Route to CSM/expansion team, not
      net-new pipeline. Research brief should pivot to expansion signals.
