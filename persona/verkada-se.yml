personas:
  IT_Director:
    meddic_role: champion
    meddic_rationale: "Owns infrastructure decisions, evaluates technical fit, drives internal consensus"
    care_about:
      - integration
      - IT_burden
      - cloud_strategy
      - vendor_consolidation
      - network_architecture
